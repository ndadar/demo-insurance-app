<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsureCo Customer Portal</title>

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (enables JSX in <script type="text/babel">) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    @keyframes slideUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    .animate-slideUp  { animation: slideUp  0.2s ease-out; }
    .animate-fadeIn   { animation: fadeIn   0.25s ease-out; }
    /* Thin scrollbar in chat */
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
  </style>
</head>

<!--
  data-wf-page: Whatfix page-tag — identifies this as the "dashboard" page
  for Whatfix Smart Tips, Flows, and beacons.
-->
<body data-wf-page="dashboard" class="bg-slate-50 min-h-screen">

      { id:'doc4',  name:'Vehicle Coverage Summary — Tesla Model 3',        category:'Policy',  date:'2024-01-15', size:'320 KB' },
      { id:'doc5',  name:'Vehicle Coverage Summary — Toyota RAV4',          category:'Policy',  date:'2024-01-15', size:'310 KB' },
      { id:'doc6',  name:'Claim Settlement Letter — CLM-2023-04421',        category:'Claims',  date:'2023-12-01', size:'142 KB' },
      { id:'doc7',  name:'Repair Estimate — CLM-2023-04421',                category:'Claims',  date:'2023-11-15', size:'89 KB'  },
      { id:'doc8',  name:'Claim Closure Notice — CLM-2023-01187',           category:'Claims',  date:'2023-05-20', size:'98 KB'  },
      { id:'doc9',  name:'January 2024 Billing Statement',                  category:'Billing', date:'2024-01-01', size:'112 KB' },

    /* ─── Formatting helpers ──────────────────────────────────────── */
    const fmt     = n  => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n);
    const fmtDate = ds => new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

    /* ═══════════════════════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════════════════════ */
    const NAV_ITEMS = [
      { id:'policies',  label:'My Policies', icon:'📄' },
      { id:'claims',    label:'Claims',       icon:'🔖' },
      { id:'billing',   label:'Billing',      icon:'💳' },
      { id:'documents', label:'Documents',    icon:'📁' },
    ];

    function Sidebar({ active, setActive }) {
      return (
        <aside
          id="sidebar"
          data-wf-section="sidebar"
          className="fixed inset-y-0 left-0 w-60 bg-white border-r border-slate-100 flex flex-col z-20 shadow-sm"
        >
          {/* Logo */}
          <div className="h-16 flex items-center gap-3 px-5 border-b border-slate-100 shrink-0">
            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs select-none">

          <nav id="main-nav" aria-label="Main navigation" className="flex-1 py-3 px-2 space-y-0.5 overflow-y-auto">

                key={item.id}

              </div>
              <div className="min-w-0">
                <p className="text-sm font-semibold text-slate-800 truncate">Nicholas Dadar</p>
                <p className="text-xs text-slate-400">Platinum Member</p>

            </div>
          </div>
        </aside>

    }

    /* ═══════════════════════════════════════════════════════════════
       TOP HEADER
    ═══════════════════════════════════════════════════════════════ */
    function TopHeader({ title }) {
      return (
        <header
          id="top-header"
          data-wf-section="top-header"
          className="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-10 shrink-0"
        >
          <div>
            <h1 className="text-slate-800 font-semibold text-base leading-tight">{title}</h1>
            <p className="text-xs text-slate-400">Welcome back, Nicholas</p>
          </div>
          <div className="flex items-center gap-1">
            <button
              id="notifications-btn"
              data-testid="notifications-btn"
              aria-label="Notifications"
              className="relative w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors"
            >
              🔔
              <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </button>
            <button
              id="settings-btn"
              data-testid="settings-btn"
              aria-label="Settings"
              className="w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors"
            >
              ⚙️
            </button>
          </div>
        </header>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       POLICY VIEW
    ═══════════════════════════════════════════════════════════════ */
    function PolicyView() {
      return (
        <section id="policy-view" data-wf-section="policy-view" className="space-y-6 animate-fadeIn">

          {/* ── Policy Header Card ───────────────────────────── */}
          <div
            id="policy-header-card"
            data-wf-section="policy-header"
            className="bg-gradient-to-r from-blue-700 to-blue-500 rounded-2xl p-6 text-white shadow-md"
          >
            <div className="flex items-start justify-between flex-wrap gap-4">
              <div>
                <p className="text-blue-200 text-xs font-medium uppercase tracking-widest">Policy</p>
                <h2 className="text-2xl font-bold mt-1">{POLICY.policyType}</h2>
                <p className="text-blue-100 font-mono text-sm mt-1">{POLICY.policyNumber}</p>
              </div>
              <div className="flex items-center gap-3 flex-wrap">
                <span
                  id="policy-status-badge"
                  data-testid="policy-status-badge"
                  className="px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold ring-1 ring-emerald-200"
                >
                  {POLICY.status}
                </span>
                {/* ★ KEY WHATFIX TARGET: Download PDF button */}
                <button
                  id="download-pdf-btn"
                  data-testid="download-pdf-btn"
                  data-wf-action="download-policy-pdf"
                  onClick={() => alert(`Downloading: ${POLICY.policyType}\n${POLICY.policyNumber}\n\n(Demo — no file generated)`)}
                  className="flex items-center gap-2 bg-white/20 hover:bg-white/30 border border-white/30 text-white text-sm font-medium px-4 py-2 rounded-xl transition-colors"
                >
                  ⬇ Download PDF
                </button>
              </div>
            </div>

            <div className="mt-5 grid grid-cols-2 md:grid-cols-4 gap-4">
              {[
                { label:'Insured',         value: POLICY.insuredName },
                { label:'Effective',       value: fmtDate(POLICY.effectiveDate) },
                { label:'Expires',         value: fmtDate(POLICY.expirationDate) },
                { label:'Monthly Premium', value: fmt(POLICY.premium.monthly) },
              ].map(({ label, value }) => (
                <div key={label}>
                  <p className="text-blue-200 text-xs uppercase tracking-wide">{label}</p>
                  <p className="text-white font-semibold mt-0.5 text-sm">{value}</p>
                </div>
              ))}
            </div>
          </div>

          {/* ── Two-column: Vehicles + Agent/Payment ──────────── */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

            {/* Vehicles */}
            <div id="vehicles-card" data-wf-section="covered-vehicles" className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
              <h3 className="font-semibold text-slate-700 text-sm mb-4 flex items-center gap-2">
                <span className="w-7 h-7 bg-blue-50 rounded-lg flex items-center justify-center text-sm">🚘</span>
                Covered Vehicles
              </h3>
              <div className="space-y-3">
                {POLICY.vehicles.map(v => (
                  <div key={v.id} id={`vehicle-row-${v.id}`} data-testid={`vehicle-row-${v.id}`} className="flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3">
                    <div>
                      <p className="font-semibold text-slate-800 text-sm">{v.year} {v.make} {v.model}</p>
                      <p className="text-xs text-slate-500 mt-0.5">{v.trim}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-xs font-mono text-slate-400">{v.plate}</p>
                      <p className="text-xs font-mono text-slate-400 mt-0.5 truncate max-w-28">{v.vin}</p>
                    </div>
                  </div>
                ))}

            </div>

                <p className="text-sm text-blue-600 mt-0.5">{POLICY.agent.email}</p>

              </div>

                  Next Payment

                <div className="flex items-center justify-between">

                    <p className="text-xs text-slate-400 mt-0.5">Due {fmtDate(POLICY.premium.nextDueDate)}</p>

                  <button

              </div>

          </div>

          {/* ── Coverage Details ───────────────────────────────── */}
          <div id="coverage-card" data-wf-section="coverage-details" className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
            <h3 className="font-semibold text-slate-700 text-sm mb-4 flex items-center gap-2">
              <span className="w-7 h-7 bg-blue-50 rounded-lg flex items-center justify-center text-sm">📋</span>
              Coverage Details

    /* ═══════════════════════════════════════════════════════════════
       CLAIMS VIEW  (multi-step form)
    ═══════════════════════════════════════════════════════════════ */
    const CLAIM_TYPES = ['Collision','Comprehensive','Theft','Weather Damage','Vandalism','Other'];
    const STATUS_COLORS = {
      Settled:   'bg-emerald-100 text-emerald-700',
      Closed:    'bg-slate-100   text-slate-600',
      'In Review':'bg-amber-100  text-amber-700',
      Open:      'bg-blue-100   text-blue-700',
    };

    function ClaimsView() {
      const [showForm,  setShowForm]  = useState(false);
      const [step,      setStep]      = useState(1);
      const [submitted, setSubmitted] = useState(false);
      const [dragOver,  setDragOver]  = useState(false);
      const [form, setForm] = useState({ date:'', type:'', vehicle:'', location:'', description:'', files:[] });

      const formTopRef  = useRef(null);
      const newClaimId  = useRef(`CLM-${new Date().getFullYear()}-${String(Math.floor(10000+Math.random()*90000))}`);

      function patch(key, val) { setForm(p => ({ ...p, [key]: val })); }

      function goToStep2() {
        if (!form.date || !form.type || !form.description) {
          alert('Please complete all required fields before continuing.');
          return;
        }
        setStep(2);
        setTimeout(() => formTopRef.current?.scrollIntoView({ behavior:'smooth', block:'start' }), 60);
      }

      function submitClaim() {
        setSubmitted(true);
        setStep(3);
      }

      function resetForm() {
        setShowForm(false); setStep(1); setSubmitted(false);
        setForm({ date:'', type:'', vehicle:'', location:'', description:'', files:[] });
      }

      function addFiles(fileList) {
        const names = Array.from(fileList).map(f => f.name);
        setForm(p => ({ ...p, files: [...p.files, ...names] }));
      }

      return (
        <section id="claims-view" data-wf-section="claims-view" className="space-y-6 animate-fadeIn">

          {/* Page title row */}
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Claims</h2>
              <p className="text-sm text-slate-500 mt-0.5">File and track your insurance claims</p>
            </div>
            {!showForm && (
              /* ★ KEY WHATFIX TARGET: open claim form */
              <button
                id="file-new-claim-btn"
                data-testid="file-new-claim-btn"
                data-wf-action="open-claim-form"
                onClick={() => { setShowForm(true); setStep(1); setSubmitted(false); }}
                className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors"
              >
                + File New Claim
              </button>
            )}
          </div>

          {/* ── Claim history table ───────────────────────────── */}
          <div id="claims-history-table" data-wf-section="claims-history" className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-100">
              <h3 className="font-semibold text-slate-700 text-sm">Claim History</h3>
            </div>
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-slate-50 text-slate-400 text-xs uppercase tracking-wide">
                  <th className="text-left px-5 py-3 font-medium">Claim ID</th>
                  <th className="text-left px-5 py-3 font-medium">Date Filed</th>
                  <th className="text-left px-5 py-3 font-medium">Type</th>
                  <th className="text-left px-5 py-3 font-medium">Status</th>
                  <th className="text-right px-5 py-3 font-medium">Amount</th>
                </tr>
              </thead>
              <tbody>
                {POLICY.claims.map(c => (
                  <tr key={c.id} id={`claim-row-${c.id}`} data-testid={`claim-row-${c.id}`} className="border-t border-slate-100 hover:bg-slate-50 transition-colors">
                    <td className="px-5 py-3 font-mono text-slate-700 font-medium text-xs">{c.id}</td>
                    <td className="px-5 py-3 text-slate-500">{fmtDate(c.date)}</td>
                    <td className="px-5 py-3 text-slate-700">{c.type}</td>
                    <td className="px-5 py-3">
                      <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${STATUS_COLORS[c.status] ?? ''}`}>{c.status}</span>
                    </td>
                    <td className="px-5 py-3 text-right font-semibold text-slate-800">{fmt(c.amount)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* ── Multi-step form ───────────────────────────────── */}
          {showForm && !submitted && (
            <div
              id="claim-form-container"
              data-wf-section="claim-form"
              ref={formTopRef}
              className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 animate-slideUp"
            >
              {/* Step progress bar */}
              <div id="claim-step-indicator" data-wf-section="claim-steps" className="flex items-center gap-2 mb-7">
                {[
                  { n:1, label:'Incident Info' },
                  { n:2, label:'Photos & Docs'  },
                ].map(({ n, label }, i, arr) => (
                  <div key={n} className="flex items-center gap-2">
                    <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors ${
                      step === n ? 'bg-blue-600 text-white'
                      : step > n  ? 'bg-emerald-500 text-white'
                      :             'bg-slate-100 text-slate-400'
                    }`}>
                      {step > n ? '✓' : n}
                    </div>
                    <span className={`text-sm font-medium ${step === n ? 'text-blue-700' : 'text-slate-400'}`}>{label}</span>
                    {i < arr.length - 1 && <span className="text-slate-200 mx-1 text-lg">›</span>}
                  </div>
                ))}
              </div>

              {/* ── Step 1: Incident Info ─────────────────────── */}
              {step === 1 && (
                <form
                  id="claim-step-1-form"
                  data-testid="claim-step-1-form"
                  data-wf-section="claim-step-1"
                  onSubmit={e => { e.preventDefault(); goToStep2(); }}
                  className="space-y-4"
                >
                  <h3 className="font-semibold text-slate-800">Step 1 — Incident Information</h3>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label htmlFor="claim-incident-date" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
                        Incident Date <span className="text-red-500">*</span>
                      </label>
                      <input
                        type="date"
                        id="claim-incident-date"
                        name="incident-date"
                        data-testid="claim-incident-date"
                        required
                        value={form.date}
                        onChange={e => patch('date', e.target.value)}
                        className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                      />
                    </div>

                    <div>
                      <label htmlFor="claim-incident-type" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
                        Incident Type <span className="text-red-500">*</span>
                      </label>
                      <select
                        id="claim-incident-type"
                        name="incident-type"
                        data-testid="claim-incident-type"
                        required
                        value={form.type}
                        onChange={e => patch('type', e.target.value)}
                        className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                      >
                        <option value="">Select type…</option>
                        {CLAIM_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                  </div>

                  <div>
                    <label htmlFor="claim-vehicle" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
                      Affected Vehicle
                    </label>
                    <select
                      id="claim-vehicle"
                      name="vehicle"
                      data-testid="claim-vehicle"
                      value={form.vehicle}
                      onChange={e => patch('vehicle', e.target.value)}
                      className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                      <option value="">Select vehicle…</option>
                      {POLICY.vehicles.map(v => (
                        <option key={v.id} value={v.id}>{v.year} {v.make} {v.model}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label htmlFor="claim-location" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
                      Incident Location
                    </label>
                    <input
                      type="text"
                      id="claim-location"
                      name="location"
                      data-testid="claim-location"
                      placeholder="e.g. 123 Main St, San Francisco, CA"
                      value={form.location}
                      onChange={e => patch('location', e.target.value)}
                      className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                  </div>

                  <div>
                    <label htmlFor="claim-description" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
                      Description <span className="text-red-500">*</span>
                    </label>
                    <textarea
                      id="claim-description"
                      name="description"
                      data-testid="claim-description"
                      rows={4}
                      required
                      placeholder="Please describe what happened in detail…"
                      value={form.description}
                      onChange={e => patch('description', e.target.value)}
                      className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                  </div>

                  <div className="flex justify-end gap-3 pt-1">
                    <button
                      type="button"
                      id="cancel-claim-btn"
                      data-testid="cancel-claim-btn"
                      onClick={resetForm}
                      className="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700 rounded-xl hover:bg-slate-100 transition-colors"
                    >
                      Cancel
                    </button>
                    {/* ★ KEY WHATFIX TARGET: Step 1 → Step 2 */}
                    <button
                      type="submit"
                      id="claim-step-1-next-btn"
                      data-testid="claim-step-1-next-btn"
                      data-wf-action="claim-step-1-continue"
                      className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-xl transition-colors"
                    >
                      Continue →
                    </button>
                  </div>
                </form>
              )}

              {/* ── Step 2: Photos & Docs ─────────────────────── */}
              {step === 2 && (
                <div
                  id="claim-step-2-form"
                  data-testid="claim-step-2-form"
                  data-wf-section="claim-step-2"
                  className="space-y-4"
                >
                  <h3 className="font-semibold text-slate-800">Step 2 — Photos &amp; Supporting Documents</h3>

                  {/* Step 1 summary */}
                  <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 text-sm">
                    <p className="text-blue-700 font-semibold text-xs uppercase tracking-wide mb-1.5">Incident Summary</p>
                    <p className="text-slate-700">
                      <span className="font-medium">Type:</span> {form.type}
                      &ensp;·&ensp;
                      <span className="font-medium">Date:</span> {fmtDate(form.date)}
                      {form.location && <span>&ensp;·&ensp;<span className="font-medium">Location:</span> {form.location}</span>}
                    </p>
                  </div>

                  {/* Drag-and-drop upload zone */}
                  <div
                    id="claim-upload-zone"
                    data-testid="claim-upload-zone"
                    data-wf-action="upload-claim-photos"
                    onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={e => { e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); }}
                    className={`border-2 border-dashed rounded-xl p-8 text-center transition-colors ${
                      dragOver ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-slate-50 hover:border-slate-300'
                    }`}
                  >
                    <div className="text-4xl mb-2">📷</div>
                    <p className="text-slate-700 font-medium text-sm">Drag &amp; drop photos or PDFs here</p>
                    <p className="text-slate-400 text-xs mt-1 mb-3">or</p>
                    <label htmlFor="claim-file-input">
                      <span
                        id="claim-browse-files-btn"
                        data-testid="claim-browse-files-btn"
                        className="inline-block bg-white border border-slate-200 hover:border-blue-400 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg cursor-pointer transition-colors"
                      >
                        Browse Files
                      </span>
                      <input
                        type="file"
                        id="claim-file-input"
                        data-testid="claim-file-input"
                        multiple
                        accept="image/*,.pdf"
                        className="hidden"
                        onChange={e => addFiles(e.target.files)}
                      />
                    </label>
                    <p className="text-slate-400 text-xs mt-3">Accepted: JPG, PNG, PDF — max 10 MB each</p>
                  </div>

                  {/* File list */}
                  {form.files.length > 0 && (
                    <div id="uploaded-files-list" data-wf-section="uploaded-files" className="space-y-2">
                      {form.files.map((name, i) => (
                        <div key={i} className="flex items-center justify-between bg-emerald-50 border border-emerald-100 rounded-lg px-4 py-2.5 text-sm">
                          <span className="text-slate-700">📎 {name}</span>
                          <button
                            id={`remove-file-${i}`}
                            aria-label={`Remove ${name}`}
                            onClick={() => setForm(p => ({ ...p, files: p.files.filter((_,j) => j !== i) }))}
                            className="text-slate-400 hover:text-red-500 transition-colors ml-4"
                          >✕</button>
                        </div>
                      ))}
                    </div>
                  )}

                  <div className="flex justify-between pt-1">
                    {/* ★ KEY WHATFIX TARGET: back button */}
                    <button
                      id="claim-step-2-back-btn"
                      data-testid="claim-step-2-back-btn"
                      data-wf-action="claim-step-2-back"
                      onClick={() => setStep(1)}
                      className="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700 rounded-xl hover:bg-slate-100 transition-colors"
                    >
                      ← Back
                    </button>
                    {/* ★ KEY WHATFIX TARGET: final submit */}
                    <button
                      id="submit-claim-btn"
                      data-testid="submit-claim-btn"
                      data-wf-action="submit-claim"
                      onClick={submitClaim}
                      className="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-xl transition-colors"
                    >
                      Submit Claim
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── Success confirmation ───────────────────────────── */}
          {submitted && (
            <div
              id="claim-success-banner"
              data-testid="claim-success-banner"
              data-wf-section="claim-success"
              className="bg-white rounded-2xl border border-emerald-100 shadow-sm p-10 text-center animate-slideUp"
            >
              <div className="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-5">✅</div>
              <h3 className="text-xl font-bold text-slate-800">Claim Submitted Successfully</h3>
              <p className="text-slate-500 text-sm mt-2">Your claim is under review. Estimated processing: 3–5 business days.</p>
              <p className="mt-4 font-mono font-bold text-blue-700 text-lg">{newClaimId.current}</p>
              <p className="text-slate-400 text-xs mt-1">A confirmation email has been sent to your address on file.</p>
              <button
                id="claim-success-done-btn"
                data-testid="claim-success-done-btn"
                data-wf-action="claim-success-done"
                onClick={resetForm}
                className="mt-6 px-7 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-xl transition-colors"
              >
                Back to Claims
              </button>
            </div>
          )}

        </section>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       BILLING VIEW
    ═══════════════════════════════════════════════════════════════ */
    function BillingView() {
      const [autopayEnabled, setAutopayEnabled] = useState(BILLING.autopay.enabled);
      const [payMethods, setPayMethods]         = useState(BILLING.paymentMethods);
      const [showPayModal, setShowPayModal]     = useState(false);
      const [showAddCard,  setShowAddCard]      = useState(false);
      const [payStep,  setPayStep]  = useState(1);
      const [payForm,  setPayForm]  = useState({ amount:'236.67', method:'pm1' });
      const [cardForm, setCardForm] = useState({ number:'', expiry:'', cvv:'', name:'' });

      function resetPay() { setShowPayModal(false); setPayStep(1); setPayForm({ amount:'236.67', method:'pm1' }); }
      function resetCard() { setShowAddCard(false); setCardForm({ number:'', expiry:'', cvv:'', name:'' }); }

      const selectedMethod = payMethods.find(pm => pm.id === payForm.method);

      return (
        <section id="billing-view" data-wf-section="billing-view" className="space-y-6 animate-fadeIn">

          {/* ── Page title row ──────────────────────────────────── */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Billing</h2>
              <p className="text-sm text-slate-500 mt-0.5">Manage payments, methods, and billing history</p>
            </div>
            {/* ★ KEY WHATFIX TARGET: open payment modal */}
            <button
              id="billing-pay-now-btn"
              data-testid="billing-pay-now-btn"
              data-wf-action="open-payment-modal"
              onClick={() => { setShowPayModal(true); setPayStep(1); }}
              className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors"
            >
              💳 Make a Payment
            </button>
          </div>

          {/* ── Balance + Autopay row ───────────────────────────── */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

            {/* Balance card */}
            <div id="billing-balance-card" data-wf-section="billing-balance" className="bg-gradient-to-r from-emerald-600 to-emerald-500 rounded-2xl p-6 text-white shadow-md">
              <p className="text-emerald-200 text-xs font-medium uppercase tracking-widest">Amount Due</p>
              <p className="text-4xl font-bold mt-1">{fmt(BILLING.balance.amount)}</p>
              <p className="text-emerald-100 text-sm mt-2">Due {fmtDate(BILLING.balance.dueDate)}</p>
              <div className="mt-5 flex gap-3">
                <button
                  id="balance-pay-btn"
                  data-testid="balance-pay-btn"
                  data-wf-action="open-payment-from-balance"
                  onClick={() => { setShowPayModal(true); setPayStep(1); }}
                  className="flex-1 bg-white text-emerald-700 font-semibold text-sm py-2.5 rounded-xl hover:bg-emerald-50 transition-colors"
                >
                  Pay Now
                </button>
                <button
                  id="view-payment-history-btn"
                  data-testid="view-payment-history-btn"
                  data-wf-action="scroll-to-payment-history"
                  onClick={() => document.getElementById('payment-history-card')?.scrollIntoView({ behavior:'smooth' })}
                  className="flex-1 bg-white/20 hover:bg-white/30 border border-white/30 text-white font-medium text-sm py-2.5 rounded-xl transition-colors"
                >
                  View History
                </button>
              </div>
            </div>

            {/* Autopay card */}
            <div id="autopay-card" data-wf-section="autopay" className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-semibold text-slate-700 text-sm flex items-center gap-2">
                  <span className="w-7 h-7 bg-blue-50 rounded-lg flex items-center justify-center text-sm">🔄</span>
                  Autopay
                </h3>
                {/* ★ KEY WHATFIX TARGET: autopay toggle */}
                <button
                  id="autopay-toggle-btn"
                  data-testid="autopay-toggle-btn"
                  data-wf-action="toggle-autopay"
                  role="switch"
                  aria-checked={autopayEnabled}
                  onClick={() => setAutopayEnabled(p => !p)}
                  className={`relative inline-flex w-12 h-6 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 ${autopayEnabled ? 'bg-blue-600' : 'bg-slate-200'}`}
                >
                  <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${autopayEnabled ? 'translate-x-6' : 'translate-x-0.5'}`} />
                </button>
              </div>

              {autopayEnabled ? (
                <div>
                  <div className="flex items-center gap-3 bg-blue-50 rounded-xl p-3">
                    <span className="text-xl">💳</span>
                    <div>
                      <p className="text-sm font-semibold text-slate-800">{BILLING.autopay.method}</p>
                      <p className="text-xs text-slate-500 mt-0.5">Next charge: {fmtDate(BILLING.autopay.nextDate)}</p>
                    </div>
                  </div>
                  <p className="text-xs text-slate-400 mt-3">
                    Autopay is <span className="text-emerald-600 font-semibold">enabled</span>. Your premium will be charged automatically each month.
                  </p>
                </div>
              ) : (
                <div>
                  <p className="text-sm text-slate-500">Autopay is <span className="font-medium text-slate-700">disabled</span>. Enable it to never miss a payment.</p>
                  <button
                    id="autopay-enable-btn"
                    data-testid="autopay-enable-btn"
                    data-wf-action="enable-autopay"
                    onClick={() => setAutopayEnabled(true)}
                    className="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-xl transition-colors"
                  >
                    Enable Autopay
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* ── Payment Methods ─────────────────────────────────── */}
          <div id="payment-methods-card" data-wf-section="payment-methods" className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-semibold text-slate-700 text-sm flex items-center gap-2">
                <span className="w-7 h-7 bg-blue-50 rounded-lg flex items-center justify-center text-sm">💳</span>
                Payment Methods
              </h3>
              {/* ★ KEY WHATFIX TARGET: add payment method */}
              <button
                id="add-payment-method-btn"
                data-testid="add-payment-method-btn"
                data-wf-action="open-add-payment-method"
                onClick={() => setShowAddCard(true)}
                className="text-sm text-blue-600 font-medium hover:text-blue-700 transition-colors"
              >
                + Add Card
              </button>
            </div>
            <div className="space-y-3">
              {payMethods.map(pm => (
                <div key={pm.id} id={`payment-method-${pm.id}`} data-testid={`payment-method-${pm.id}`} className="flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3">
                  <div className="flex items-center gap-3">
                    <span className="text-xl">{pm.type === 'Visa' ? '💳' : '🪙'}</span>
                    <div>
                      <p className="text-sm font-semibold text-slate-800">{pm.type} ••••{pm.last4}</p>
                      <p className="text-xs text-slate-400 mt-0.5">Expires {pm.expiry}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    {pm.isDefault && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-medium">Default</span>}
                    <button
                      id={`remove-payment-${pm.id}`}
                      data-testid={`remove-payment-${pm.id}`}
                      data-wf-action="remove-payment-method"
                      onClick={() => setPayMethods(p => p.filter(m => m.id !== pm.id))}
                      className="text-slate-300 hover:text-red-400 transition-colors ml-2"
                      aria-label={`Remove ${pm.type} ••••${pm.last4}`}
                    >✕</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* ── Payment History ─────────────────────────────────── */}
          <div id="payment-history-card" data-wf-section="payment-history" className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-100">
              <h3 className="font-semibold text-slate-700 text-sm">Payment History</h3>
            </div>
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-slate-50 text-slate-400 text-xs uppercase tracking-wide">
                  <th className="text-left px-5 py-3 font-medium">Transaction ID</th>
                  <th className="text-left px-5 py-3 font-medium">Date</th>
                  <th className="text-left px-5 py-3 font-medium">Method</th>
                  <th className="text-left px-5 py-3 font-medium">Status</th>
                  <th className="text-right px-5 py-3 font-medium">Amount</th>
                </tr>
              </thead>
              <tbody>
                {BILLING.history.map(p => (
                  <tr key={p.id} id={`payment-row-${p.id}`} data-testid={`payment-row-${p.id}`} className="border-t border-slate-100 hover:bg-slate-50 transition-colors">
                    <td className="px-5 py-3 font-mono text-slate-700 font-medium text-xs">{p.id}</td>
                    <td className="px-5 py-3 text-slate-500">{fmtDate(p.date)}</td>
                    <td className="px-5 py-3 text-slate-700">{p.method}</td>
                    <td className="px-5 py-3">
                      <span className="px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-700">{p.status}</span>
                    </td>
                    <td className="px-5 py-3 text-right font-semibold text-slate-800">{fmt(p.amount)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* ══════════════════════════════════════════════════════
              MAKE A PAYMENT MODAL  (3 steps)
          ══════════════════════════════════════════════════════ */}
          {showPayModal && (
            <div id="payment-modal-overlay" data-wf-section="payment-modal" className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 animate-fadeIn px-4">
              <div id="payment-modal" data-testid="payment-modal" className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 animate-slideUp">

                {/* Step 1 — Select amount & method */}
                {payStep === 1 && (
                  <>
                    <div className="flex items-center justify-between mb-5">
                      <h3 className="font-bold text-slate-800 text-lg">Make a Payment</h3>
                      <button id="payment-modal-close-btn" data-testid="payment-modal-close-btn" onClick={resetPay} className="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button>
                    </div>

                    {/* Amount selector */}
                    <div className="mb-4">
                      <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Payment Amount</label>
                      <div className="flex gap-2">
                        <button
                          id="pay-amount-full-btn"
                          data-testid="pay-amount-full-btn"
                          data-wf-action="select-full-payment-amount"
                          onClick={() => setPayForm(p => ({ ...p, amount:'236.67' }))}
                          className={`flex-1 py-3 rounded-xl border text-sm font-medium transition-colors ${payForm.amount === '236.67' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600 hover:border-slate-300'}`}
                        >
                          Full Amount<br /><span className="font-bold text-base">$236.67</span>
                        </button>
                        <button
                          id="pay-amount-other-btn"
                          data-testid="pay-amount-other-btn"
                          data-wf-action="select-custom-payment-amount"
                          onClick={() => setPayForm(p => ({ ...p, amount:'' }))}
                          className={`flex-1 py-3 rounded-xl border text-sm font-medium transition-colors ${payForm.amount !== '236.67' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600 hover:border-slate-300'}`}
                        >
                          Other Amount
                        </button>
                      </div>
                      {payForm.amount !== '236.67' && (
                        <input
                          type="number"
                          id="pay-custom-amount-input"
                          data-testid="pay-custom-amount-input"
                          data-wf-action="enter-custom-payment-amount"
                          placeholder="Enter amount (e.g. 100.00)"
                          value={payForm.amount}
                          onChange={e => setPayForm(p => ({ ...p, amount: e.target.value }))}
                          className="w-full mt-2 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      )}
                    </div>

                    {/* Method selector */}
                    <div className="mb-6">
                      <label className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Payment Method</label>
                      <select
                        id="pay-method-select"
                        data-testid="pay-method-select"
                        data-wf-action="select-payment-method"
                        value={payForm.method}
                        onChange={e => setPayForm(p => ({ ...p, method: e.target.value }))}

                        id="pay-review-btn"
                        data-testid="pay-review-btn"

                        className="flex-1 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium transition-colors"
                      >
                        Review Payment →
                      </button>
                    </div>
                  </>
                )}

                {/* Step 2 — Review & confirm */}
                {payStep === 2 && (
                  <>
                    <div className="flex items-center justify-between mb-5">
                      <h3 className="font-bold text-slate-800 text-lg">Confirm Payment</h3>
                      <button onClick={resetPay} className="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button>
                    </div>

                    <div id="payment-review-details" data-wf-section="payment-review" className="bg-slate-50 rounded-xl p-4 space-y-3 mb-5">
                      <div className="flex justify-between items-center">
                        <span className="text-sm text-slate-500">Amount</span>
                        <span className="font-bold text-slate-800 text-lg">{fmt(parseFloat(payForm.amount))}</span>
                      </div>
                      <div className="flex justify-between text-sm">
                        <span className="text-slate-500">Method</span>
                        <span className="text-slate-700">{selectedMethod?.type} ••••{selectedMethod?.last4}</span>
                      </div>
                      <div className="flex justify-between text-sm">
                        <span className="text-slate-500">Policy</span>
                        <span className="text-slate-700 font-mono text-xs">{POLICY.policyNumber}</span>
                      </div>
                      <div className="flex justify-between text-sm border-t border-slate-200 pt-3">
                        <span className="text-slate-500">Processing date</span>
                        <span className="text-slate-700">Today</span>
                      </div>
                    </div>

                    <div className="flex gap-3">
                      <button
                        id="pay-back-btn"
                        data-testid="pay-back-btn"
                        onClick={() => setPayStep(1)}
                        className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 text-sm font-medium hover:bg-slate-50 transition-colors"
                      >
                        ← Back
                      </button>
                      <button
                        id="pay-confirm-btn"
                        data-testid="pay-confirm-btn"
                        data-wf-action="confirm-payment"
                        onClick={() => setPayStep(3)}
                        className="flex-1 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium transition-colors"
                      >
                        Confirm &amp; Pay
                      </button>
                    </div>
                  </>
                )}

                {/* Step 3 — Success */}
                {payStep === 3 && (
                  <div id="payment-success" data-wf-section="payment-success" className="text-center py-4">
                    <div className="w-14 h-14 bg-emerald-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">✅</div>
                    <h3 className="text-xl font-bold text-slate-800">Payment Successful!</h3>
                    <p className="text-slate-500 text-sm mt-2">
                      Your payment of <span className="font-bold text-slate-700">{fmt(parseFloat(payForm.amount))}</span> has been processed.
                    </p>
                    <p className="text-slate-400 text-xs mt-1">A receipt has been emailed to your address on file.</p>
                    <button
                      id="payment-done-btn"
                      data-testid="payment-done-btn"
                      data-wf-action="payment-success-done"
                      onClick={resetPay}
                      className="mt-5 w-full py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition-colors"
                    >
                      Done
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ══════════════════════════════════════════════════════
              ADD CARD MODAL
          ══════════════════════════════════════════════════════ */}
          {showAddCard && (
            <div id="add-card-modal-overlay" data-wf-section="add-card-modal" className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 animate-fadeIn px-4">
              <div id="add-card-modal" data-testid="add-card-modal" className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 animate-slideUp">
                <div className="flex items-center justify-between mb-5">
                  <h3 className="font-bold text-slate-800 text-lg">Add Payment Method</h3>
                  <button id="add-card-close-btn" data-testid="add-card-close-btn" onClick={resetCard} className="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button>
                </div>

                <div className="space-y-4">

                    <label htmlFor="card-number-input" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Card Number</label>

                      data-wf-action="enter-card-number"

                    />

                  <div className="grid grid-cols-2 gap-4">

                        type="text"
                        id="card-expiry-input"
                        data-testid="card-expiry-input"
                        data-wf-action="enter-card-expiry"

                        maxLength={5}
                        value={cardForm.expiry}
                        onChange={e => setCardForm(p => ({ ...p, expiry: e.target.value }))}

                        value={cardForm.cvv}
                        onChange={e => setCardForm(p => ({ ...p, cvv: e.target.value }))}

    /* ═══════════════════════════════════════════════════════════════
       DOCUMENTS VIEW
    ═══════════════════════════════════════════════════════════════ */
    const CAT_ICONS = { Policy:'📄', Claims:'🔖', Billing:'💳' };
    const CAT_COLORS = {
      Policy:  'bg-blue-100 text-blue-700',
      Claims:  'bg-amber-100 text-amber-700',
      Billing: 'bg-emerald-100 text-emerald-700',
    };

    function DocumentsView() {
      const [activeCategory, setActiveCategory] = useState('All');
      const [searchQuery,    setSearchQuery]    = useState('');
      const [showUpload,     setShowUpload]     = useState(false);
      const [uploadDragOver, setUploadDragOver] = useState(false);
      const [uploadFiles,    setUploadFiles]    = useState([]);
      const [uploadCategory, setUploadCategory] = useState('');

      const categories = ['All', 'Policy', 'Claims', 'Billing'];

      const filtered = DOCUMENTS.filter(doc => {
        const matchCat    = activeCategory === 'All' || doc.category === activeCategory;
        const matchSearch = doc.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      function addUploadFiles(fileList) {
        setUploadFiles(p => [...p, ...Array.from(fileList).map(f => f.name)]);
      }

      function resetUpload() {
        setShowUpload(false);
        setUploadFiles([]);
        setUploadDragOver(false);
        setUploadCategory('');
      }

      return (
        <section id="documents-view" data-wf-section="documents-view" className="space-y-6 animate-fadeIn">

          {/* ── Page title row ──────────────────────────────────── */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Documents</h2>
              <p className="text-sm text-slate-500 mt-0.5">Access, download, and upload your policy documents</p>
            </div>
            {/* ★ KEY WHATFIX TARGET: upload document */}
            <button
              id="upload-document-btn"
              data-testid="upload-document-btn"
              data-wf-action="open-upload-document-modal"
              onClick={() => setShowUpload(true)}
              className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors"
            >
              ⬆ Upload Document
            </button>
          </div>

          {/* ── Search + category filter ────────────────────────── */}
          <div className="flex items-center gap-3 flex-wrap">
            <div className="relative flex-1 min-w-[200px]">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔍</span>
              <input
                type="text"
                id="document-search-input"
                data-testid="document-search-input"
                data-wf-action="search-documents"
                placeholder="Search documents…"
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                className="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
            {/* ★ KEY WHATFIX TARGET: category filter tabs */}
            <div id="document-category-filter" data-wf-section="doc-category-filters" className="flex gap-2 flex-wrap">
              {categories.map(cat => (
                <button
                  key={cat}
                  id={`doc-filter-${cat.toLowerCase()}`}
                  data-testid={`doc-filter-${cat.toLowerCase()}`}
                  data-wf-action={`filter-docs-${cat.toLowerCase()}`}
                  onClick={() => setActiveCategory(cat)}
                  className={`px-3 py-2 rounded-xl text-sm font-medium transition-colors ${
                    activeCategory === cat
                      ? 'bg-blue-600 text-white'
                      : 'bg-white border border-slate-200 text-slate-600 hover:border-slate-300 hover:text-slate-800'
                  }`}
                >
                  {cat !== 'All' && <span className="mr-1">{CAT_ICONS[cat]}</span>}{cat}
                </button>
              ))}
            </div>
          </div>

          {/* ── Document count summary ──────────────────────────── */}
          <p className="text-xs text-slate-400">{filtered.length} document{filtered.length !== 1 ? 's' : ''}</p>

          {/* ── Document list ───────────────────────────────────── */}
          <div id="document-list" data-wf-section="document-list" className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            {filtered.length === 0 ? (
              <div className="p-12 text-center text-slate-400 text-sm">No documents found matching your search.</div>
            ) : (
              filtered.map((doc, i) => (
                <div
                  key={doc.id}
                  id={`document-row-${doc.id}`}
                  data-testid={`document-row-${doc.id}`}
                  data-wf-section={`document-item-${doc.id}`}
                  className={`flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition-colors ${i > 0 ? 'border-t border-slate-100' : ''}`}
                >
                  <div className="flex items-center gap-4 min-w-0">
                    <div className="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-lg shrink-0">📄</div>
                    <div className="min-w-0">
                      <p className="text-sm font-semibold text-slate-800 truncate">{doc.name}</p>
                      <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                        <span className="text-xs text-slate-400">{fmtDate(doc.date)}</span>
                        <span className="text-slate-200">·</span>
                        <span className="text-xs text-slate-400">{doc.size}</span>
                        <span className="text-slate-200">·</span>
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${CAT_COLORS[doc.category]}`}>
                          {CAT_ICONS[doc.category]} {doc.category}
                        </span>
                      </div>
                    </div>
                  </div>
                  {/* ★ KEY WHATFIX TARGET: download document */}
                  <button
                    id={`download-doc-${doc.id}`}
                    data-testid={`download-doc-${doc.id}`}
                    data-wf-action="download-document"
                    onClick={() => alert(`Downloading: ${doc.name}\n\n(Demo — no file generated)`)}
                    className="flex items-center gap-1.5 text-sm text-blue-600 font-medium hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-xl transition-colors shrink-0 ml-4"
                  >
                    ⬇ Download
                  </button>
                </div>
              ))
            )}
          </div>

          {/* ══════════════════════════════════════════════════════
              UPLOAD DOCUMENT MODAL
          ══════════════════════════════════════════════════════ */}
          {showUpload && (
            <div id="upload-modal-overlay" data-wf-section="upload-document-modal" className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 animate-fadeIn px-4">
              <div id="upload-modal" data-testid="upload-modal" className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 animate-slideUp">
                <div className="flex items-center justify-between mb-5">
                  <h3 className="font-bold text-slate-800 text-lg">Upload Document</h3>
                  <button
                    id="upload-modal-close-btn"
                    data-testid="upload-modal-close-btn"
                    onClick={resetUpload}
                    className="text-slate-400 hover:text-slate-700 text-xl leading-none"
                  >✕</button>
                </div>

                {/* Category selector */}
                <div className="mb-4">
                  <label htmlFor="upload-category-select" className="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Document Category</label>
                  <select
                    id="upload-category-select"
                    data-testid="upload-category-select"
                    data-wf-action="select-upload-category"
                    value={uploadCategory}
                    onChange={e => setUploadCategory(e.target.value)}
                    className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="">Select category…</option>
                    <option value="Policy">Policy</option>
                    <option value="Claims">Claims</option>
                    <option value="Billing">Billing</option>
                    <option value="Other">Other</option>
                  </select>
                </div>

                {/* Drag-and-drop zone */}
                <div
                  id="upload-drop-zone"
                  data-testid="upload-drop-zone"
                  data-wf-action="document-upload-dropzone"
                  onDragOver={e => { e.preventDefault(); setUploadDragOver(true); }}
                  onDragLeave={() => setUploadDragOver(false)}
                  onDrop={e => { e.preventDefault(); setUploadDragOver(false); addUploadFiles(e.dataTransfer.files); }}
                  className={`border-2 border-dashed rounded-xl p-8 text-center transition-colors ${
                    uploadDragOver ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-slate-50 hover:border-slate-300'
                  }`}
                >
                  <div className="text-4xl mb-2">📁</div>
                  <p className="text-slate-700 font-medium text-sm">Drag &amp; drop files here</p>
                  <p className="text-slate-400 text-xs mt-1 mb-3">or</p>
                  <label htmlFor="upload-file-input">
                    <span
                      id="upload-browse-btn"
                      data-testid="upload-browse-btn"
                      data-wf-action="browse-upload-files"
                      className="inline-block bg-white border border-slate-200 hover:border-blue-400 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg cursor-pointer transition-colors"
                    >
                      Browse Files
                    </span>
                    <input
                      type="file"
                      id="upload-file-input"
                      data-testid="upload-file-input"
                      multiple
                      accept=".pdf,.jpg,.png,.doc,.docx"
                      className="hidden"
                      onChange={e => addUploadFiles(e.target.files)}
                    />
                  </label>
                  <p className="text-slate-400 text-xs mt-3">Accepted: PDF, JPG, PNG, DOC — max 25 MB</p>
                </div>

                {/* Staged file list */}
                {uploadFiles.length > 0 && (
                  <div id="upload-staged-files" data-wf-section="staged-upload-files" className="mt-3 space-y-2">
                    {uploadFiles.map((name, i) => (
                      <div key={i} className="flex items-center justify-between bg-emerald-50 border border-emerald-100 rounded-lg px-4 py-2.5 text-sm">
                        <span className="text-slate-700 truncate">📎 {name}</span>
                        <button
                          id={`remove-upload-file-${i}`}
                          aria-label={`Remove ${name}`}
                          onClick={() => setUploadFiles(p => p.filter((_,j) => j !== i))}
                          className="text-slate-400 hover:text-red-500 transition-colors ml-4 shrink-0"
                        >✕</button>
                      </div>
                    ))}
                  </div>
                )}

                <div className="flex gap-3 mt-5">
                  <button onClick={resetUpload} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-500 text-sm font-medium hover:bg-slate-50 transition-colors">Cancel</button>
                  <button
                    id="upload-submit-btn"
                    data-testid="upload-submit-btn"
                    data-wf-action="submit-document-upload"
                    onClick={() => {
                      if (uploadFiles.length === 0) { alert('Please select at least one file to upload.'); return; }
                      alert(`${uploadFiles.length} file${uploadFiles.length > 1 ? 's' : ''} uploaded successfully!\n\n(Demo — no files stored)`);
                      resetUpload();
                    }}
                    className="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition-colors"
                  >
                    Upload
                  </button>
                </div>
              </div>
            </div>
          )}
        </section>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       SUPPORT CHAT WIDGET  (mocked — no API calls)
    ═══════════════════════════════════════════════════════════════ */
    const INITIAL_MSGS = [
      { id:0, from:'agent', text:"Hi Nicholas! 👋 I'm Sarah, your InsureCo support agent. How can I help you today?" },
    ];
    const QUICK_REPLIES = ['Policy questions','File a claim','Payment help','Update my info'];
    const AUTO_REPLIES  = {
      'Policy questions': `Your active policy is the Platinum Auto Policy (${POLICY.policyNumber}). What would you like to know?`,
      'File a claim':     "To file a claim, click 'Claims' in the left sidebar and then click '+ File New Claim'. I'll walk you through it!",
      'Payment help':     `Your next payment of ${fmt(POLICY.premium.monthly)} is due ${fmtDate(POLICY.premium.nextDueDate)}. Click 'Pay Now' on the Policies page to pay instantly.`,
      'Update my info':   'To update your personal information, please visit Account Settings or call us at (800) 555-0192.',
    };
    const FALLBACK = "Thanks for your message! A specialist will follow up within 24 hours. Is there anything else I can help with?";

    function SupportChat() {
      const [open,     setOpen]     = useState(false);
      const [messages, setMessages] = useState(INITIAL_MSGS);
      const [input,    setInput]    = useState('');
      const [typing,   setTyping]   = useState(false);
      const endRef = useRef(null);

      useEffect(() => {
        if (open) endRef.current?.scrollIntoView({ behavior:'smooth' });
      }, [messages, open, typing]);

      function send(text) {
        if (!text.trim()) return;
        setMessages(p => [...p, { id: Date.now(), from:'user', text }]);
        setInput('');
        setTyping(true);
        const reply = AUTO_REPLIES[text] ?? FALLBACK;
        setTimeout(() => {
          setTyping(false);
          setMessages(p => [...p, { id: Date.now()+1, from:'agent', text: reply }]);
        }, 1100);
      }

      return (
        <div id="support-chat-widget" data-wf-section="support-chat" className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

          {/* Chat window */}
          {open && (
            <div
              id="support-chat-window"
              data-wf-section="chat-window"
              className="w-80 bg-white rounded-2xl shadow-2xl border border-slate-100 flex flex-col overflow-hidden animate-slideUp"
              style={{ height:'420px' }}
            >
              {/* Header */}
              <div id="chat-window-header" className="bg-blue-600 px-4 py-3 flex items-center justify-between shrink-0">
                <div className="flex items-center gap-2.5">
                  <div className="w-8 h-8 rounded-full bg-white/25 flex items-center justify-center text-white text-xs font-bold shrink-0">SM</div>
                  <div>
                    <p className="text-white font-semibold text-sm leading-tight">{POLICY.agent.name}</p>
                    <p className="text-blue-200 text-xs">Support Agent · Online</p>
                  </div>
                </div>
                <button
                  id="chat-close-btn"
                  data-testid="chat-close-btn"
                  aria-label="Close chat"
                  onClick={() => setOpen(false)}
                  className="text-white/60 hover:text-white text-xl leading-none transition-colors"
                >×</button>
              </div>

              {/* Messages */}
              <div id="chat-messages" data-wf-section="chat-messages" className="flex-1 overflow-y-auto px-4 py-3 space-y-3 bg-slate-50">
                {messages.map(msg => (
                  <div key={msg.id} className={`flex ${msg.from === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[85%] px-3 py-2 rounded-2xl text-sm leading-snug ${
                      msg.from === 'user'
                        ? 'bg-blue-600 text-white rounded-br-none'
                        : 'bg-white text-slate-700 shadow-sm border border-slate-100 rounded-bl-none'
                    }`}>
                      {msg.text}
                    </div>
                  </div>
                ))}

                {typing && (
                  <div className="flex justify-start">
                    <div className="bg-white text-slate-400 px-3 py-2 rounded-2xl rounded-bl-none shadow-sm border border-slate-100 text-sm italic">
                      Sarah is typing…
                    </div>
                  </div>
                )}

                {/* Quick reply chips — shown only on first message */}
                {messages.length === 1 && !typing && (
                  <div id="quick-reply-chips" data-wf-section="quick-replies" className="flex flex-wrap gap-2 pt-1">
                    {QUICK_REPLIES.map(r => (
                      <button
                        key={r}
                        id={`quick-reply-${r.toLowerCase().replace(/\s+/g,'-')}`}
                        data-testid={`quick-reply-${r.toLowerCase().replace(/\s+/g,'-')}`}
                        data-wf-action={`quick-reply-${r.toLowerCase().replace(/\s+/g,'-')}`}
                        onClick={() => send(r)}
                        className="text-xs bg-white border border-blue-200 text-blue-700 px-3 py-1.5 rounded-full hover:bg-blue-50 transition-colors"
                      >
                        {r}
                      </button>
                    ))}
                  </div>
                )}

                <div ref={endRef} />
              </div>

              {/* Input bar */}
              <div id="chat-input-row" className="px-3 py-3 border-t border-slate-100 bg-white flex items-center gap-2 shrink-0">
                <input
                  type="text"
                  id="support-chat-input"
                  data-testid="support-chat-input"
                  data-wf-action="type-chat-message"
                  placeholder="Type a message…"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && send(input)}
                  className="flex-1 text-sm border border-slate-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
                {/* ★ KEY WHATFIX TARGET: send message */}
                <button
                  id="support-chat-send-btn"
                  data-testid="support-chat-send-btn"
                  data-wf-action="send-chat-message"
                  onClick={() => send(input)}
                  aria-label="Send message"
                  className="w-9 h-9 rounded-xl bg-blue-600 hover:bg-blue-700 flex items-center justify-center text-white text-sm shrink-0 transition-colors"
                >
                  ➤
                </button>
              </div>
            </div>
          )}

          {/* ★ KEY WHATFIX TARGET: chat toggle bubble */}
          <button
            id="support-chat-toggle"
            data-testid="support-chat-toggle"
            data-wf-action="toggle-support-chat"
            aria-label={open ? 'Close support chat' : 'Open support chat'}
            onClick={() => setOpen(o => !o)}
            className="w-14 h-14 rounded-full bg-blue-600 hover:bg-blue-700 shadow-lg flex items-center justify-center text-2xl transition-all active:scale-95"
          >
            {open ? '✕' : '💬'}
          </button>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       APP ROOT
    ═══════════════════════════════════════════════════════════════ */
    function App() {
      const [active, setActive] = useState('policies');
      const currentNav = NAV_ITEMS.find(n => n.id === active);

      return (
        <div id="app-shell" className="flex min-h-screen bg-slate-50">
          <Sidebar active={active} setActive={setActive} />

          <div id="main-shell" className="flex-1 flex flex-col ml-60 min-h-screen">
            <TopHeader title={currentNav?.label ?? 'Dashboard'} />

            <main id="main-content" data-wf-section="main-content" className="flex-1 p-8 max-w-5xl w-full mx-auto">
              {active === 'policies'  && <PolicyView />}
              {active === 'claims'    && <ClaimsView />}
              {active === 'billing'   && <BillingView />}
              {active === 'documents' && <DocumentsView />}
            </main>

            <footer id="page-footer" className="px-8 py-4 border-t border-slate-100 text-xs text-slate-400 flex justify-between shrink-0">
              <span>© 2024 InsureCo. All rights reserved.</span>
              <span>Demo — all data is illustrative only.</span>
            </footer>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
